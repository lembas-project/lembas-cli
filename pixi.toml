[workspace]
name = "lembas-cli"
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64", "linux-64", "linux-aarch64"]

[dependencies]
python = ">=3.11"
rust = "*"
pre-commit = ">=4"
pynacl = ">=1.5"

[tasks.pre-commit]
cmd = "pre-commit run --all-files"
description = "Run pre-commit hooks"

[tasks.build]
cmd = "cargo build"
description = "Build debug binary"

[tasks.build-release]
cmd = "cargo build --release"
description = "Build release binary"

[tasks.test]
cmd = "cargo test"
description = "Run tests"

[tasks.lint]
cmd = "cargo clippy && cargo fmt --check"
description = "Run Rust lints"

[tasks.sign]
cmd = "python scripts/sign-binary.py"
description = "Sign a binary (usage: pixi run sign <binary> <key_file>)"
