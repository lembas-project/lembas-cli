name: Release

on:
  release:
    types: [published]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: lembas-linux-x86_64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: lembas-linux-aarch64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: lembas-darwin-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust
        run: rustup show

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: mv target/${{ matrix.target }}/release/lembas ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          retention-days: 7

  publish:
    name: Publish Release
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: binaries

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          for dir in binaries/*/; do
            artifact="$(basename "$dir")"
            mv "$dir/$artifact" "release-assets/$artifact"
          done

      - name: Generate checksums
        run: |
          cd release-assets
          for file in *; do
            sha256sum "$file" > "${file}.sha256"
          done

      - name: Sign binaries
        env:
          SIGNING_KEY: ${{ secrets.RELEASE_SIGNING_KEY }}
        run: |
          echo "$SIGNING_KEY" | base64 -d > /tmp/signing_key.bin
          pip install pynacl
          for file in release-assets/lembas-*; do
            [[ "$file" == *.sha256 ]] && continue
            python3 scripts/sign-binary.py "$file" /tmp/signing_key.bin
          done
          rm -f /tmp/signing_key.bin

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.ref_name }}
        run: |
          gh release upload "$VERSION" release-assets/* --clobber
          gh release upload "$VERSION" scripts/install.sh --clobber
          gh release edit "$VERSION" --draft=false --latest
