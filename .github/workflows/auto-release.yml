name: Auto Release

on:
  push:
    branches: [main]
    paths:
      - locks/pixi.lock
  workflow_dispatch:
    inputs:
      bump:
        description: 'Bump type (patch bumps YYYY.M.X, minor bumps to YYYY.M.0)'
        required: false
        default: 'patch'
        type: choice
        options:
          - patch
          - minor

permissions: {}

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Get latest tag version
        id: latest
        run: |
          # Get latest tag, default to v0.0.0 if none
          latest=$(git describe --tags --abbrev=0 --match "v*" 2>/dev/null || echo "v0.0.0")
          echo "tag=$latest" >> "$GITHUB_OUTPUT"
          echo "version=${latest#v}" >> "$GITHUB_OUTPUT"

      - name: Calculate next version
        id: next
        env:
          LATEST: ${{ steps.latest.outputs.version }}
          BUMP: ${{ github.event.inputs.bump || 'patch' }}
        run: |
          # CalVer format: YYYY.M.PATCH
          year=$(date +%Y)
          month=$(date +%-m)

          # Parse latest version (might be old semver or calver)
          latest_major=$(echo "$LATEST" | cut -d. -f1)

          # If latest looks like CalVer (year >= 2024), parse it
          if [ "$latest_major" -ge 2024 ]; then
            latest_year=$latest_major
            latest_month=$(echo "$LATEST" | cut -d. -f2)
            latest_patch=$(echo "$LATEST" | cut -d. -f3)
          else
            # Old semver tag, start fresh with CalVer
            latest_year=0
            latest_month=0
            latest_patch=-1
          fi

          # Calculate next version
          if [ "$year" != "$latest_year" ] || [ "$month" != "$latest_month" ] || [ "$BUMP" = "minor" ]; then
            # New month or manual minor bump -> reset patch
            next="${year}.${month}.0"
          else
            # Same month -> increment patch
            next_patch=$((latest_patch + 1))
            next="${year}.${month}.${next_patch}"
          fi

          echo "version=$next" >> "$GITHUB_OUTPUT"
          echo "Next version: $next"

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.next.outputs.version }}
        run: |
          if gh release view "v$VERSION" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract lembas version from lockfile
        if: steps.check.outputs.exists == 'false'
        id: lembas
        run: |
          version=$(grep -oP '(?<=/lembas-)[0-9.]+(?=-)' locks/pixi.lock | head -1)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Create draft release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.next.outputs.version }}
          LEMBAS_VERSION: ${{ steps.lembas.outputs.version }}
          PREV_TAG: ${{ steps.latest.outputs.tag }}
        run: |
          # Generate notes body
          body="Bundles lembas $LEMBAS_VERSION"

          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --generate-notes \
            --draft \
            --notes "$body"
