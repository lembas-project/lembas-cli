name: Auto Release

on:
  push:
    branches: [main]
    paths:
      - locks/pixi.lock
  workflow_dispatch:
    inputs:
      bump:
        description: 'Bump type (patch bumps YYYY.M.X, minor bumps to YYYY.M.0)'
        required: false
        default: 'patch'
        type: choice
        options:
          - patch
          - minor

permissions: {}

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: true  # Needed to push version bump

      - name: Get current version from Cargo.toml
        id: current
        run: |
          version=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Calculate next version
        id: next
        env:
          CURRENT: ${{ steps.current.outputs.version }}
          BUMP: ${{ github.event.inputs.bump || 'patch' }}
        run: |
          # Current format: YYYY.M.PATCH
          year=$(date +%Y)
          month=$(date +%-m)

          # Parse current version
          current_year=$(echo "$CURRENT" | cut -d. -f1)
          current_month=$(echo "$CURRENT" | cut -d. -f2)
          current_patch=$(echo "$CURRENT" | cut -d. -f3)

          # Calculate next version
          if [ "$year" != "$current_year" ] || [ "$month" != "$current_month" ] || [ "$BUMP" = "minor" ]; then
            # New month or manual minor bump -> reset patch
            next="${year}.${month}.0"
          else
            # Same month -> increment patch
            next_patch=$((current_patch + 1))
            next="${year}.${month}.${next_patch}"
          fi

          echo "version=$next" >> "$GITHUB_OUTPUT"
          echo "Next version: $next"

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.next.outputs.version }}
        run: |
          if gh release view "v$VERSION" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update Cargo.toml version
        if: steps.check.outputs.exists == 'false'
        env:
          VERSION: ${{ steps.next.outputs.version }}
        run: |
          sed -i "s/^version = .*/version = \"$VERSION\"/" Cargo.toml
          cargo check  # Update Cargo.lock

      - name: Extract lembas version from lockfile
        if: steps.check.outputs.exists == 'false'
        id: lembas
        run: |
          version=$(grep -oP '(?<=/lembas-)[0-9.]+(?=-)' locks/pixi.lock | head -1)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        if: steps.check.outputs.exists == 'false'
        env:
          VERSION: ${{ steps.next.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          git commit -m "chore: Bump version to $VERSION" || echo "No changes to commit"
          git push

      - name: Create release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.next.outputs.version }}
          LEMBAS_VERSION: ${{ steps.lembas.outputs.version }}
        run: |
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --generate-notes \
            --notes-start-tag "$(git describe --tags --abbrev=0 2>/dev/null || echo '')" \
            --draft \
            --notes "Bundles lembas $LEMBAS_VERSION

          ## What's Changed
          $(gh api repos/${{ github.repository }}/releases/generate-notes -f tag_name="v$VERSION" --jq '.body' 2>/dev/null || echo 'See commits for changes.')"
