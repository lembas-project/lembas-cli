[package]
name = "lembas-cli"
version = "0.1.0"
edition = "2024"
description = "Self-bootstrapping CLI for lembas lifecycle engineering analysis"
license = "MIT"
repository = "https://github.com/lembas-project/lembas-cli"
readme = "README.md"

[[bin]]
name = "lembas"
path = "src/main.rs"

[dependencies]
conda-ship = { git = "https://github.com/jezdez/conda-ship", rev = "32118e89cedaa2bda100abe0946d97182c3a9649", default-features = false, features = ["fleet", "native-tls"] }
clap = { version = "4", features = ["derive"] }
dirs = "6"
miette = { version = "7", features = ["fancy"] }
sha2 = "0.10"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[profile.release]
lto = true
strip = true
opt-level = "z"
